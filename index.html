<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TVAI Games">
    <meta name="google-site-verification" content="sdTb3DjqoC8q7KIGJ1BVFu2pAtXr_FvLnjqojUveApQ">
    <title>TVAI • متصفح الألعاب V3</title>
    <style>
        :root {
            --bg-deep: #020617;
            --bg-primary: #0a0b1e;
            --bg-secondary: #11132b;
            --bg-tertiary: #1a1c3a;
            --bg-card: #13152f;
            --bg-card-hover: #1d1f45;
            --border-color: #1f2140;
            --text-primary: #e8eaf8;
            --text-secondary: #b0b2d0;
            --text-muted: #6e708e;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-green: #10b981;
            --accent-gold: #f59e0b;
            --glow-blue: 0 0 25px rgba(59,130,246,0.3);
            --glow-purple: 0 0 20px rgba(139,92,246,0.3);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 18px;
            --radius-xl: 22px;
            --font-sans: 'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; height: 100%; overflow: hidden; }
        body {
            font-family: var(--font-sans);
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh; height: 100dvh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            background-image: radial-gradient(ellipse at 25% 20%, rgba(59,130,246,0.08) 0%, transparent 55%),
                              radial-gradient(ellipse at 75% 65%, rgba(139,92,246,0.07) 0%, transparent 55%),
                              radial-gradient(ellipse at 50% 90%, rgba(236,72,153,0.04) 0%, transparent 45%);
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #2a2c50; border-radius: 10px; }

        #app-shell { display: flex; flex-direction: column; height: 100%; }
        #browser-header {
            display: flex; flex-direction: column; flex-shrink: 0;
            background: rgba(10,11,30,0.85); backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border-color);
        }
        #top-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px;
        }
        .logo-area { display: flex; align-items: baseline; gap: 4px; }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .version { font-size: 0.6rem; color: var(--text-muted); margin-right: 2px; }
        .header-actions { display: flex; gap: 6px; }
        .icon-btn {
            width: 34px; height: 34px; border-radius: 50%; border: none;
            background: var(--bg-tertiary); color: var(--text-secondary);
            cursor: pointer; font-size: 0.9rem; display: flex; align-items: center;
            justify-content: center; transition: 0.2s; position: relative;
        }
        .icon-btn:hover { background: #252a50; color: #fff; }
        .icon-btn.active { background: rgba(59,130,246,0.2); color: var(--accent-blue); box-shadow: 0 0 12px rgba(59,130,246,0.3); }
        .badge {
            position: absolute; top: -4px; right: -4px; background: var(--accent-pink);
            color: #fff; font-size: 0.55rem; width: 18px; height: 18px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        #tab-bar {
            display: flex; align-items: center; gap: 2px; padding: 0 8px;
            overflow-x: auto; scrollbar-width: none; min-height: 38px;
        }
        .tab {
            display: flex; align-items: center; gap: 5px; padding: 7px 12px;
            border-radius: 10px 10px 0 0; background: var(--bg-tertiary);
            cursor: pointer; font-size: 0.75rem; color: var(--text-secondary);
            border: 1px solid transparent; white-space: nowrap; max-width: 140px;
            flex-shrink: 0; transition: 0.15s;
        }
        .tab.active { background: var(--bg-deep); color: var(--accent-blue); border-color: var(--border-color); font-weight: 600; }
        .tab:hover:not(.active) { background: #1e2240; }
        .tab-close { width: 16px; height: 16px; border-radius: 50%; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 0.65rem; opacity: 0; transition: 0.15s; }
        .tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
        #new-tab-btn {
            width: 26px; height: 26px; border-radius: 50%; border: 1.5px dashed var(--border-color);
            background: transparent; color: var(--text-muted); cursor: pointer;
            font-size: 0.9rem; flex-shrink: 0; margin-left: 2px;
        }

        #address-row {
            display: flex; align-items: center; gap: 8px; padding: 4px 10px 8px;
        }
        .addr-wrapper { flex: 1; position: relative; }
        #address-bar {
            width: 100%; padding: 10px 44px 10px 14px; border-radius: 22px;
            border: 2px solid var(--border-color); background: var(--bg-secondary);
            color: var(--text-primary); font-size: 0.85rem; outline: none;
            font-family: var(--font-sans); transition: 0.25s;
        }
        #address-bar:focus { border-color: var(--accent-blue); box-shadow: var(--glow-blue); }
        #search-btn {
            position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
            width: 32px; height: 32px; border-radius: 50%; border: none;
            background: var(--accent-blue); color: #000; font-weight: 700;
            cursor: pointer; font-size: 0.75rem;
        }

        #content-area { flex: 1; overflow: hidden; position: relative; }
        .view-container { position: absolute; inset: 0; display: none; flex-direction: column; }
        .view-container.active { display: flex; }
        .discovery-view { overflow-y: auto; padding-bottom: 20px; }
        .web-view { overflow: hidden; }
        #web-iframe { flex: 1; border: none; background: #111; }

        /* Sections */
        .section { padding: 8px 14px 2px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .section-header h2 { font-size: 1rem; font-weight: 700; }
        .horiz-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 6px; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .horiz-scroll::-webkit-scrollbar { display: none; }

        /* Game Cards */
        .game-card-h {
            flex-shrink: 0; width: 260px; background: var(--bg-card);
            border-radius: var(--radius-lg); overflow: hidden;
            cursor: pointer; border: 1px solid var(--border-color);
            transition: 0.25s; scroll-snap-align: start;
        }
        .game-card-h:hover { transform: translateY(-4px); border-color: var(--accent-blue); box-shadow: 0 12px 28px rgba(0,0,0,0.5); }
        .game-card-h .card-img { width: 100%; height: 140px; object-fit: cover; background: var(--bg-tertiary); }
        .game-card-h .card-info { padding: 10px 12px; }
        .game-card-h .game-name { font-weight: 700; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-card-h .game-meta { font-size: 0.62rem; color: var(--text-muted); margin-top: 2px; }
        .game-card-h .game-rating { font-weight: 700; color: var(--accent-gold); font-size: 0.8rem; }

        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr)); gap: 12px; padding: 8px 14px; }
        .game-card-v {
            background: var(--bg-card); border-radius: var(--radius-md); overflow: hidden;
            cursor: pointer; border: 1px solid var(--border-color); transition: 0.25s;
        }
        .game-card-v:hover { transform: translateY(-3px); border-color: var(--accent-blue); }
        .game-card-v .card-img { width: 100%; aspect-ratio: 16/10; object-fit: cover; background: var(--bg-tertiary); }
        .game-card-v .card-info { padding: 10px; }
        .game-card-v .game-name { font-weight: 700; font-size: 0.78rem; }
        .game-card-v .game-meta { font-size: 0.62rem; color: var(--text-muted); }
        .game-card-v .game-rating { font-weight: 700; color: var(--accent-gold); }

        /* Detail Overlay */
        #detail-overlay {
            position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(16px); display: flex; justify-content: center;
            align-items: stretch; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #detail-overlay.open { opacity: 1; pointer-events: all; }
        #detail-panel {
            background: var(--bg-primary); width: 100%; max-width: 900px;
            overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            transform: translateY(25px) scale(0.97); transition: transform 0.35s;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }
        #detail-overlay.open #detail-panel { transform: translateY(0) scale(1); }
        #detail-close {
            position: absolute; top: 14px; right: 14px; width: 36px; height: 36px;
            border-radius: 50%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            color: #fff; border: none; cursor: pointer; z-index: 10; font-size: 1.1rem;
        }
        #detail-hero { position: relative; width: 100%; min-height: 240px; max-height: 350px; background: var(--bg-tertiary); overflow: hidden; }
        #detail-hero img { width: 100%; height: 100%; object-fit: cover; }
        #detail-info { padding: 16px 20px 8px; margin-top: -35px; position: relative; z-index: 2; }
        #detail-title { font-size: 1.7rem; font-weight: 800; color: #fff; }
        .meta-badge {
            padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600;
            display: inline-block; margin-right: 5px; margin-top: 5px;
            background: rgba(59,130,246,0.15); color: var(--accent-blue);
        }
        .detail-btn {
            padding: 9px 18px; border-radius: 20px; border: none; font-weight: 600;
            cursor: pointer; margin-right: 6px; margin-top: 8px; font-size: 0.78rem;
        }
        .btn-primary { background: var(--accent-blue); color: #fff; }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-color); }
        #detail-about { padding: 0 20px 12px; }
        #detail-screenshots { padding: 0 20px 16px; }
        .screenshots-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; }
        .screenshots-row img { width: 220px; height: 130px; object-fit: cover; border-radius: var(--radius-md); flex-shrink: 0; }
        #detail-similar { padding: 0 20px 20px; }
        .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px,1fr)); gap: 10px; }
        .similar-card {
            background: var(--bg-card); border-radius: var(--radius-md); overflow: hidden;
            cursor: pointer; border: 1px solid var(--border-color);
        }
        .similar-card .sim-img { width: 100%; aspect-ratio: 16/10; object-fit: cover; background: var(--bg-tertiary); }
        .similar-card .sim-info { padding: 8px 10px; font-size: 0.7rem; }

        /* Favorites Panel */
        #fav-panel {
            position: fixed; right: 0; top: 0; bottom: 0; width: 380px; max-width: 90vw;
            background: var(--bg-primary); z-index: 160; transform: translateX(100%);
            transition: 0.35s; border-left: 1px solid var(--border-color);
            box-shadow: -10px 0 40px rgba(0,0,0,0.6); display: flex; flex-direction: column;
        }
        #fav-panel.open { transform: translateX(0); }
        #fav-header { padding: 16px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; }
        #fav-list { flex: 1; overflow-y: auto; padding: 10px; }
        .fav-item {
            display: flex; gap: 12px; padding: 10px; background: var(--bg-card);
            border-radius: var(--radius-md); margin-bottom: 8px; cursor: pointer;
            align-items: center; transition: 0.2s;
        }
        .fav-item:hover { background: var(--bg-card-hover); }
        .fav-item img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
        .fav-item .fav-info { flex: 1; }
        .fav-item .fav-name { font-weight: 600; font-size: 0.85rem; }
        .fav-item .fav-rating { color: var(--accent-gold); font-size: 0.7rem; }
        .fav-remove-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; }

        /* Toast */
        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: var(--bg-tertiary); padding: 10px 22px; border-radius: 22px;
            z-index: 999; font-size: 0.8rem; white-space: nowrap;
            animation: toastAnim 2.5s forwards;
        }
        @keyframes toastAnim { 0%{opacity:0; bottom:70px} 10%{opacity:1; bottom:90px} 80%{opacity:1} 100%{opacity:0; bottom:110px} }

        @media (max-width:768px) {
            .game-card-h { width: 210px; }
            .game-card-h .card-img { height: 120px; }
        }
    </style>
</head>
<body>
<div id="app-shell">
    <div id="browser-header">
        <div id="top-bar">
            <div class="logo-area"><span class="logo">TVAI</span><span class="version">V3</span></div>
            <div class="header-actions">
                <button class="icon-btn" id="btn-safe" title="البحث الآمن">🛡️</button>
                <button class="icon-btn" id="btn-fav" title="المفضلة">❤️<span class="badge" id="fav-count"></span></button>
                <button class="icon-btn" id="btn-home" title="الرئيسية">🏠</button>
            </div>
        </div>
        <div id="tab-bar">
            <div id="tabs-container"></div>
            <button id="new-tab-btn">+</button>
        </div>
        <div id="address-row">
            <div class="addr-wrapper">
                <input type="text" id="address-bar" placeholder="ابحث عن لعبة أو أدخل رابط..." autocomplete="off">
                <button id="search-btn">▶</button>
            </div>
        </div>
    </div>
    <div id="content-area"></div>
</div>

<!-- Detail Overlay -->
<div id="detail-overlay">
    <div id="detail-panel">
        <button id="detail-close">✕</button>
        <div id="detail-hero"><img id="detail-hero-img" src="" alt=""></div>
        <div id="detail-info">
            <h2 id="detail-title"></h2>
            <div id="detail-badges"></div>
            <div style="margin-top:8px">
                <button class="detail-btn btn-primary" id="detail-similar-btn">🔍 ألعاب مشابهة</button>
                <button class="detail-btn btn-secondary" id="detail-fav-btn">❤️</button>
            </div>
        </div>
        <div id="detail-about"><h3>📖 نبذة</h3><p id="detail-desc"></p></div>
        <div id="detail-screenshots"><h3>📸 لقطات</h3><div class="screenshots-row" id="screenshots-row"></div></div>
        <div id="detail-similar"><h3>🎯 ألعاب مشابهة</h3><div class="similar-grid" id="similar-grid"></div></div>
    </div>
</div>

<!-- Favorites Panel -->
<div id="fav-panel">
    <div id="fav-header"><h3>❤️ المفضلة</h3><button id="fav-close-btn" class="icon-btn">✕</button></div>
    <div id="fav-list"></div>
</div>

<script>
// ══════════════════════════════════════
// حماية خفيفة
(function() {
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key==='F12' || (e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J')) || (e.ctrlKey&&e.key==='U')) {
            e.preventDefault();
        }
    });
})();

// مفتاح RAWG مشفر
const _rk = 'N2ViNzFkZTE1YTM2NDczODg2M2I0YjFmOGI0OGEwYTE=';
const RAWG_KEY = atob(_rk);
const RAWG_URL = 'https://api.rawg.io/api';
const BLOCKED_TAGS = ['nudity','sexual-content','nsfw','hentai','adult'];

// عناصر DOM
const $ = s => document.querySelector(s);
const D = {
    addr: $('#address-bar'), searchBtn: $('#search-btn'), homeBtn: $('#btn-home'),
    safeBtn: $('#btn-safe'), favBtn: $('#btn-fav'), favCount: $('#fav-count'),
    tabContainer: $('#tabs-container'), newTabBtn: $('#new-tab-btn'),
    content: $('#content-area'),
    overlay: $('#detail-overlay'), closeDetail: $('#detail-close'),
    heroImg: $('#detail-hero-img'), title: $('#detail-title'),
    badges: $('#detail-badges'), detailDesc: $('#detail-desc'),
    screenshotsRow: $('#screenshots-row'), similarGrid: $('#similar-grid'),
    similarBtn: $('#detail-similar-btn'), favDetailBtn: $('#detail-fav-btn'),
    favPanel: $('#fav-panel'), favList: $('#fav-list'), favCloseBtn: $('#fav-close-btn'),
};

// حالة التطبيق
let state = {
    tabs: [],
    activeTabId: null,
    favs: JSON.parse(localStorage.getItem('tvai_favs')||'[]'),
    safe: localStorage.getItem('tvai_safe')!=='false',
    cache: { trending: null, lastFetch: 0 },
    topRated: [], newReleases: [], upcoming: [], popular: []
};

// مفضلات
function saveFavs() { localStorage.setItem('tvai_favs', JSON.stringify(state.favs)); updateFavBadge(); }
function isFav(id) { return state.favs.some(f => f.id === id); }
function addFav(game) {
    if (isFav(game.id)) return false;
    state.favs.unshift({ id: game.id, name: game.name, rating: game.rating, img: game.background_image, released: game.released, genres: game.genres });
    saveFavs(); renderFavPanel(); return true;
}
function removeFav(id) {
    const idx = state.favs.findIndex(f => f.id === id);
    if (idx === -1) return false;
    state.favs.splice(idx, 1); saveFavs(); renderFavPanel(); return true;
}
function updateFavBadge() {
    D.favCount.textContent = state.favs.length || '';
    D.favCount.style.display = state.favs.length ? 'flex' : 'none';
}
function renderFavPanel() {
    if (!state.favs.length) {
        D.favList.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">لا توجد مفضلات بعد</p>';
        return;
    }
    D.favList.innerHTML = state.favs.map(f => `
        <div class="fav-item" onclick="window._openDetail(${f.id})">
            <img src="${f.img||''}" loading="lazy" onerror="this.style.display='none'">
            <div class="fav-info">
                <div class="fav-name">${f.name}</div>
                <div class="fav-rating">⭐ ${f.rating ? f.rating.toFixed(1) : 'N/A'}</div>
            </div>
            <button class="fav-remove-btn" onclick="event.stopPropagation(); window._removeFav(${f.id})">✕</button>
        </div>
    `).join('');
}
window._removeFav = id => { removeFav(id); toast('تمت الإزالة'); };
D.favBtn.onclick = () => { renderFavPanel(); D.favPanel.classList.toggle('open'); };
D.favCloseBtn.onclick = () => D.favPanel.classList.remove('open');

// تنبيهات
function toast(msg) {
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

// تصفية المحتوى
function filterGames(games) {
    if (!state.safe) return games;
    return games.filter(g => {
        if (g.esrb_rating?.name === 'Adults Only') return false;
        if (g.tags?.some(t => BLOCKED_TAGS.includes(t.slug?.toLowerCase()))) return false;
        return true;
    });
}

// استدعاء RAWG
async function rawg(endpoint, params={}) {
    const url = new URL(RAWG_URL + endpoint);
    url.searchParams.set('key', RAWG_KEY);
    Object.entries(params).forEach(([k,v]) => v !== undefined && url.searchParams.set(k,v));
    const res = await fetch(url);
    if (!res.ok) throw new Error('RAWG');
    return res.json();
}

// تحميل البيانات الأولية مع كاش بسيط
async function loadTrending() {
    const now = Date.now();
    if (state.cache.trending && (now - state.cache.lastFetch < 10 * 60 * 1000)) {
        return state.cache.trending;
    }
    try {
        const [top, newR, up, pop] = await Promise.all([
            rawg('/games', { ordering:'-rating', page_size:8, metacritic:'80,100' }),
            rawg('/games', { ordering:'-released', page_size:8, dates:'2024-01-01,2025-12-31' }),
            rawg('/games', { ordering:'-added', page_size:8, dates:'2025-06-01,2026-12-31' }),
            rawg('/games', { ordering:'-added', page_size:8 })
        ]);
        const data = {
            top: filterGames(top.results||[]),
            newReleases: filterGames(newR.results||[]),
            upcoming: filterGames(up.results||[]),
            popular: filterGames(pop.results||[])
        };
        state.cache.trending = data;
        state.cache.lastFetch = now;
        return data;
    } catch(e) {
        return { top:[], newReleases:[], upcoming:[], popular:[] };
    }
}

// بناء واجهة البداية
function renderHomeView(container) {
    container.innerHTML = '<div style="padding:10px 14px;color:var(--text-muted);">⚡ أهلاً بك في TVAI V3</div>';
    loadTrending().then(data => {
        container.innerHTML = '';
        const sections = [
            ['⭐ الأعلى تقييماً', data.top],
            ['🆕 إصدارات جديدة', data.newReleases],
            ['📅 قادمة', data.upcoming],
            ['🔥 الأكثر شعبية', data.popular]
        ];
        sections.forEach(([title, games]) => {
            if (!games.length) return;
            container.innerHTML += `
                <div class="section">
                    <div class="section-header"><h2>${title}</h2></div>
                    <div class="horiz-scroll">${games.map(g => gameCardH(g)).join('')}</div>
                </div>`;
        });
    });
}

function gameCardH(g) {
    const img = g.background_image || '';
    const r = g.rating ? g.rating.toFixed(1) : 'N/A';
    const date = g.released || '';
    const genre = g.genres?.[0]?.name || '';
    return `<div class="game-card-h" data-id="${g.id}" onclick="window._openDetail(${g.id})">
        <img class="card-img" src="${img}" loading="lazy" onerror="this.style.display='none'">
        <div class="card-info">
            <div class="game-name">${g.name}</div>
            <div class="game-meta">${date} • ${genre}</div>
            <div class="game-rating">⭐ ${r}</div>
        </div>
    </div>`;
}

// صفحة تفاصيل اللعبة
async function openDetail(id) {
    D.overlay.classList.add('open');
    D.title.textContent = 'جاري التحميل...'; D.detailDesc.textContent = '';
    D.heroImg.style.display = 'none'; D.screenshotsRow.innerHTML = ''; D.similarGrid.innerHTML = '';
    try {
        const game = await rawg(`/games/${id}`);
        D.title.textContent = game.name;
        D.badges.innerHTML = `
            <span class="meta-badge">⭐ ${game.rating||'N/A'}</span>
            <span class="meta-badge">📅 ${game.released||'TBA'}</span>
            <span class="meta-badge">${game.genres?.map(g=>g.name).join(' · ')||''}</span>
        `;
        D.detailDesc.textContent = (game.description_raw || '').slice(0, 800);
        D.heroImg.src = game.background_image || '';
        D.heroImg.style.display = game.background_image ? 'block' : 'none';
        const fav = isFav(game.id);
        D.favDetailBtn.textContent = fav ? '💖' : '❤️';
        D.favDetailBtn.onclick = () => {
            if (fav) { removeFav(game.id); D.favDetailBtn.textContent = '❤️'; toast('أزيلت من المفضلة'); }
            else { addFav(game); D.favDetailBtn.textContent = '💖'; toast('أضيفت للمفضلة'); }
        };
        D.similarBtn.onclick = async () => {
            const sim = await rawg(`/games/${id}/suggested`, { page_size: 12 });
            const filtered = filterGames(sim.results||[]);
            if (filtered.length) {
                D.overlay.classList.remove('open');
                const view = document.querySelector('.discovery-view');
                if (view) {
                    view.innerHTML = `<div class="section"><h2>🎯 مشابهة لـ "${game.name}"</h2></div><div class="results-grid">${filtered.map(g=>gameCardV(g)).join('')}</div>`;
                }
            } else toast('لا توجد ألعاب مشابهة');
        };
        const scr = await rawg(`/games/${id}/screenshots`, { page_size: 8 });
        D.screenshotsRow.innerHTML = (scr.results||[]).map(s => `<img src="${s.image}" loading="lazy">`).join('');
        const simGames = await rawg(`/games/${id}/suggested`, { page_size: 12 });
        D.similarGrid.innerHTML = filterGames(simGames.results||[]).map(g => `
            <div class="similar-card" onclick="window._openDetail(${g.id})">
                <img class="sim-img" src="${g.background_image||''}" loading="lazy">
                <div class="sim-info"><strong>${g.name}</strong><br>⭐ ${g.rating||'?'}</div>
            </div>`).join('');
    } catch(e) {
        D.title.textContent = 'خطأ في التحميل';
    }
}
window._openDetail = id => openDetail(id);
function closeDetail() { D.overlay.classList.remove('open'); }
D.closeDetail.onclick = closeDetail;
D.overlay.onclick = e => { if (e.target === D.overlay) closeDetail(); };

// نظام التبويبات
function createTab(title='الرئيسية', type='home', url='') {
    const id = Date.now() + Math.random();
    state.tabs.push({ id, title, type, url });
    switchTab(id);
    renderTabs();
}
function closeTab(id) {
    if (state.tabs.length <= 1) return;
    const idx = state.tabs.findIndex(t => t.id===id);
    if (idx===-1) return;
    const wasActive = state.activeTabId === id;
    state.tabs.splice(idx,1);
    if (wasActive) switchTab(state.tabs[Math.min(idx, state.tabs.length-1)].id);
    renderTabs();
}
function switchTab(id) {
    state.activeTabId = id;
    renderTabs();
    updateView();
}
function getActiveTab() { return state.tabs.find(t => t.id === state.activeTabId); }
function renderTabs() {
    D.tabContainer.innerHTML = '';
    state.tabs.forEach(tab => {
        const el = document.createElement('div');
        el.className = 'tab' + (tab.id===state.activeTabId?' active':'');
        el.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;">${tab.title}</span><button class="tab-close">&times;</button>`;
        el.onclick = () => switchTab(tab.id);
        el.querySelector('.tab-close').onclick = e => { e.stopPropagation(); closeTab(tab.id); };
        D.tabContainer.appendChild(el);
    });
}
function updateView() {
    const tab = getActiveTab();
    if (!tab) return;
    D.content.innerHTML = '';
    if (tab.type === 'web') {
        const c = document.createElement('div'); c.className = 'view-container web-view active';
        const iframe = document.createElement('iframe'); iframe.id='web-iframe'; iframe.sandbox='allow-scripts allow-same-origin';
        iframe.src = tab.url; c.appendChild(iframe);
        D.content.appendChild(c);
        D.addr.value = tab.url;
    } else {
        const c = document.createElement('div'); c.className = 'view-container discovery-view active';
        D.content.appendChild(c);
        renderHomeView(c);
        D.addr.value = '';
    }
}

// البحث
async function search(query) {
    const view = document.querySelector('.discovery-view');
    if (!view) return;
    view.innerHTML = '<div style="padding:30px;text-align:center;">⏳ جاري البحث...</div>';
    try {
        const data = await rawg('/games', { search: query, page_size: 30, ordering:'-rating' });
        const games = filterGames(data.results||[]);
        view.innerHTML = `<div style="padding:10px 14px;"><h2>🔍 نتائج "${query}"</h2></div><div class="results-grid">${games.map(g=>gameCardV(g)).join('')}</div>`;
        if (!games.length) view.innerHTML += '<p style="text-align:center;color:var(--text-muted);padding:20px;">😔 لا نتائج</p>';
    } catch(e) {
        view.innerHTML = '<p style="text-align:center;color:var(--accent-pink);padding:20px;">فشل البحث</p>';
    }
}
function gameCardV(g) {
    const img = g.background_image||'';
    const r = g.rating?g.rating.toFixed(1):'N/A';
    return `<div class="game-card-v" data-id="${g.id}" onclick="window._openDetail(${g.id})">
        <img class="card-img" src="${img}" loading="lazy" onerror="this.style.display='none'">
        <div class="card-info">
            <div class="game-name">${g.name}</div>
            <div class="game-meta">${g.released||''}</div>
            <div class="game-rating">⭐ ${r}</div>
        </div>
    </div>`;
}

// أحداث الشريط
D.searchBtn.onclick = () => {
    const val = D.addr.value.trim();
    if (!val) return;
    if (/^https?:\/\//.test(val) || /^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}/.test(val)) {
        const tab = getActiveTab();
        if (tab) {
            tab.type = 'web'; tab.url = val.startsWith('http')?val:'https://'+val;
            tab.title = new URL(val.startsWith('http')?val:'https://'+val).hostname;
            renderTabs(); updateView();
        }
    } else {
        if (getActiveTab()?.type !== 'home') {
            const tab = getActiveTab(); if (tab) { tab.type = 'home'; renderTabs(); updateView(); }
        }
        search(val);
    }
};
D.addr.onkeydown = e => { if (e.key==='Enter') D.searchBtn.click(); };
D.homeBtn.onclick = () => {
    const tab = getActiveTab();
    if (tab) { tab.type = 'home'; tab.title = 'الرئيسية'; renderTabs(); updateView(); }
};
D.newTabBtn.onclick = () => createTab('الرئيسية', 'home');

// بحث آمن
D.safeBtn.onclick = () => {
    if (state.safe) {
        // إخلاء مسؤولية
        const d = document.createElement('div');
        d.style.cssText = 'position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;';
        d.innerHTML = `<div style="background:var(--bg-primary);padding:24px;border-radius:24px;max-width:400px;text-align:center;border:1px solid var(--border-color);">
            <h3 style="color:var(--accent-pink);">⚠️ تحذير</h3>
            <p style="color:var(--text-secondary);margin:16px 0;">قد يظهر محتوى غير لائق. مؤسس المتصفح غير مسؤول.</p>
            <button id="accept-risk" style="padding:8px 20px;border-radius:16px;background:var(--accent-pink);color:#fff;border:none;margin-right:8px;">أوافق</button>
            <button id="decline-risk" style="padding:8px 20px;border-radius:16px;background:var(--bg-tertiary);color:#fff;border:none;">تراجع</button>
        </div>`;
        document.body.appendChild(d);
        d.querySelector('#accept-risk').onclick = () => {
            state.safe = false; localStorage.setItem('tvai_safe','false');
            D.safeBtn.classList.remove('active'); D.safeBtn.textContent='🔓';
            toast('🔓 البحث الآمن معطّل'); d.remove();
        };
        d.querySelector('#decline-risk').onclick = () => d.remove();
    } else {
        state.safe = true; localStorage.setItem('tvai_safe','true');
        D.safeBtn.classList.add('active'); D.safeBtn.textContent='🛡️';
        toast('🛡️ البحث الآمن مفعّل');
    }
};

// تهيئة
if (state.safe) { D.safeBtn.classList.add('active'); D.safeBtn.textContent='🛡️'; }
else { D.safeBtn.classList.remove('active'); D.safeBtn.textContent='🔓'; }
updateFavBadge();
createTab('الرئيسية', 'home');
</script>

</body></html>
